<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History — Quantity Measurement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/history.css">
  <link rel="stylesheet" href="css/toast.css">
  <script src="js/auth-guard.js"></script>
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main class="history-page">

    <div class="page-header">
      <h1>Measurement History</h1>
      <p>Review your past calculations — filter by operation type or measurement category.</p>
    </div>

    <!-- Filter bar -->
    <div class="filter-panel">
      <div class="filter-group">
        <label class="filter-label">Operation</label>
        <select class="filter-select" id="filter-op">
          <option value="all">All Operations</option>
          <option value="compare">Compare</option>
          <option value="convert">Convert</option>
          <option value="add">Add</option>
          <option value="subtract">Subtract</option>
          <option value="divide">Divide</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Measurement Type</label>
        <select class="filter-select" id="filter-type">
          <option value="all">All Types</option>
          <option value="LengthUnit">Length</option>
          <option value="WeightUnit">Weight</option>
          <option value="TemperatureUnit">Temperature</option>
          <option value="VolumeUnit">Volume</option>
        </select>
      </div>
      <button class="btn-refresh" id="btn-refresh">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Refresh
      </button>
    </div>

    <!-- Table -->
    <div class="table-card">
      <table class="history-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Type</th>
            <th>Operation</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody id="history-tbody">
          <tr class="empty-row"><td colspan="4">Loading history…</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <script src="js/api-client.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/history.js"></script>
</body>
</html>
