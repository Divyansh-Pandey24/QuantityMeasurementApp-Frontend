<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Quantity Measurement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/toast.css">
  <script src="js/auth-guard.js"></script>
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main class="profile-page">
    <div class="profile-card">

      <!-- Avatar + info -->
      <div class="profile-header">
        <div class="profile-avatar" id="profile-avatar">U</div>
        <div class="profile-info">
          <h2 id="profile-name">Loading…</h2>
          <p id="profile-email">Fetching from server…</p>
          <div class="profile-role" id="profile-role">USER</div>
        </div>
      </div>

      <hr class="profile-divider">

      <!-- Change password -->
      <h3 class="profile-section-title">Change Password</h3>
      <p class="profile-section-desc">
        You must provide your current password to set a new one.
      </p>

      <form id="reset-form" class="profile-form" novalidate>

        <div class="profile-field">
          <label for="curr-pass">Current Password</label>
          <div class="pw-wrapper">
            <input type="password" id="curr-pass" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="pw-eye" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);color:var(--text-muted);cursor:pointer;display:flex;border:none;background:none;padding:.25rem;" aria-label="Toggle">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="profile-field">
          <label for="new-pass">New Password</label>
          <div class="pw-wrapper">
            <input type="password" id="new-pass" placeholder="••••••••" required autocomplete="new-password">
            <button type="button" class="pw-eye" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);color:var(--text-muted);cursor:pointer;display:flex;border:none;background:none;padding:.25rem;" aria-label="Toggle">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div style="font-size:.75rem; color:var(--text-muted); margin-top:.35rem;">
            Min. 8 characters — 1 uppercase, 1 number, 1 special character
          </div>
        </div>

        <button type="submit" class="btn-update" id="btn-reset">Update Password</button>

      </form>

    </div>
  </main>

  <script src="js/api-client.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
